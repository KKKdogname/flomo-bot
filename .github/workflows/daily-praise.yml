name: Daily Praise

on:
  workflow_dispatch:
  schedule:
    - cron: "7 14 * * *"

jobs:
  praise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --production
      - name: Generate daily praise note
        env:
          FLOMO_MCP_URL: "https://flomoapp.com/mcp"
          FLOMO_MCP_TOKEN: ${{ secrets.FLOMO_MCP_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node daily-praise.js
